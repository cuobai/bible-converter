<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和合本2010 經文轉換器 (神版 ➔ 浸字版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #7f8c8d;
            margin-top: 0;
        }
        .converter-box {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #34495e;
        }
        textarea {
            width: 100%;
            height: 400px;
            padding: 15px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 16px;
            line-height: 1.6;
            resize: vertical;
            box-sizing: border-box;
            background-color: #fff;
        }
        textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }
        .btn-group {
            text-align: center;
            margin-top: 10px;
        }
        button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #27ae60;
        }
        button.btn-copy {
            background-color: #3498db;
            margin-left: 10px;
        }
        button.btn-copy:hover {
            background-color: #2980b9;
        }
        .status-msg {
            color: #27ae60;
            font-weight: bold;
            margin-top: 10px;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>和合本2010 經文轉換器</h1>
        <p class="subtitle">專為浸信會設計：保留「神」版，精準取代「洗 ➔ 浸」</p>
    </header>

    <div class="converter-box">
        <div class="panel">
            <label for="inputText">請貼上原始經文（神版）：</label>
            <textarea id="inputText" placeholder="在這裡貼上經文...&#10;例如：當下，耶穌從加利利來到約旦河，見了約翰，要受他的洗。"></textarea>
        </div>
        
        <div class="panel">
            <label for="outputText">轉換後的經文（神浸版）：</label>
            <textarea id="outputText" readonly placeholder="轉換後的結果會顯示在這裡..."></textarea>
        </div>
    </div>

    <div class="btn-group">
        <button onclick="convertText()">立即轉換 ➔</button>
        <button class="btn-copy" onclick="copyToClipboard()">複製結果</button>
        <div id="status" class="status-msg"></div>
    </div>
</div>

<script>
    // 浸信會專用字詞轉換規則
    const replacementRules = [
        { old: /洗禮/g, newStr: '浸禮' },
        { old: /受洗/g, newStr: '受浸' },
        { old: /施洗/g, newStr: '施浸' },
        { old: /洗淨/g, newStr: '浸淨' },
        { old: /洗去/g, newStr: '浸去' },
        { old: /約翰的洗/g, newStr: '約翰的浸' },
        { old: /受他的洗/g, newStr: '受他的浸' },
        { old: /受你的洗/g, newStr: '受你的浸' },
        { old: /所受的洗/g, newStr: '所受的浸' },
        { old: /當受的洗/g, newStr: '當受的浸' },
        { old: /重生的洗/g, newStr: '重生的浸' },
        { old: /受了洗/g, newStr: '受了浸' },
    ];

    function convertText() {
        const inputTextArea = document.getElementById('inputText');
        const outputTextArea = document.getElementById('outputText');
        const statusDiv = document.getElementById('status');
        
        let text = inputTextArea.value;
        
        if (!text.trim()) {
            statusDiv.style.color = '#e74c3c';
            statusDiv.innerText = '請先貼上經文內容！';
            return;
        }

        // 逐一取代特定詞彙
        replacementRules.forEach(rule => {
            text = text.replace(rule.old, rule.newStr);
        });

        outputTextArea.value = text;
        statusDiv.style.color = '#27ae60';
        statusDiv.innerText = '✨ 轉換完成！';
    }

    function copyToClipboard() {
        const outputTextArea = document.getElementById('outputText');
        const statusDiv = document.getElementById('status');
        
        if (!outputTextArea.value) {
            statusDiv.style.color = '#e74c3c';
            statusDiv.innerText = '沒有內容可以複製！';
            return;
        }

        outputTextArea.select();
        outputTextArea.setSelectionRange(0, 99999); // 行動裝置相容

        navigator.clipboard.writeText(outputTextArea.value).then(() => {
            statusDiv.style.color = '#3498db';
            statusDiv.innerText = '📋 已成功複製到剪貼簿！';
            setTimeout(() => { statusDiv.innerText = ''; }, 3000);
        }).catch(err => {
            statusDiv.style.color = '#e74c3c';
            statusDiv.innerText = '複製失敗，請手動全選複製。';
        });
    }
</script>

</body>
</html>
